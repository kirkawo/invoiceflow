services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/InvoiceFlow.Api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ConnectionString: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      App__BaseUrl: ${API_BASE_URL}
      App__PublicBaseUrl: ${APP_PUBLIC_BASE_URL}
      Email__SmtpHost: ${EMAIL_HOST}
      Email__SmtpPort: ${EMAIL_PORT}
      Email__FromAddress: ${EMAIL_FROM}
      Email__Username: ${EMAIL_USERNAME}
      Email__Password: ${EMAIL_PASSWORD}
      Email__UseSsl: ${EMAIL_USE_SSL}
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      - dataprotection_keys:/app/DataProtection-Keys
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/InvoiceFlow.Web/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ConnectionString: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      App__BaseUrl: ${WEB_BASE_URL}
      App__PublicBaseUrl: ${APP_PUBLIC_BASE_URL}
      Email__SmtpHost: ${EMAIL_HOST}
      Email__SmtpPort: ${EMAIL_PORT}
      Email__FromAddress: ${EMAIL_FROM}
      Email__Username: ${EMAIL_USERNAME}
      Email__Password: ${EMAIL_PASSWORD}
      Email__UseSsl: ${EMAIL_USE_SSL}
    ports:
      - "${WEB_PORT:-5001}:8080"
    volumes:
      - dataprotection_keys:/app/DataProtection-Keys
    restart: unless-stopped

volumes:
  pgdata_prod:
  dataprotection_keys:

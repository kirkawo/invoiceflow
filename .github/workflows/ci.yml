name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      ASPNETCORE_ENVIRONMENT: Testing
      DOTNET_ENVIRONMENT: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore InvoiceFlow.sln

      - name: Build (Release)
        run: dotnet build InvoiceFlow.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test InvoiceFlow.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**'
          if-no-files-found: warn

  docker-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          POSTGRES_DB=invoiceflow
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          CONNECTIONSTRINGS__DEFAULTCONNECTION=Host=db;Port=5432;Database=invoiceflow;Username=postgres;Password=postgres
          ASPNETCORE_ENVIRONMENT=Production
          DOTNET_ENVIRONMENT=Production
          HTTPSREDIRECT=false
          BOOTSTRAP_ENABLED=true
          BOOTSTRAP_ADMIN_EMAIL=admin@invoiceflow.local
          BOOTSTRAP_ADMIN_PASSWORD=Admin123!
          EOF

      - name: Build Docker image (Api)
        run: docker build -t invoiceflow-api:ci -f src/InvoiceFlow.Api/Dockerfile .

      - name: Build Docker image (Web)
        run: docker build -t invoiceflow-web:ci -f src/InvoiceFlow.Web/Dockerfile .

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config

      - name: Start production-like stack
        run: docker compose -f docker-compose.prod.yml up -d --build

      - name: Wait for containers
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.prod.yml ps; then
              sleep 2
            fi
          done

      - name: Check container status
        run: docker compose -f docker-compose.prod.yml ps

      - name: Smoke test web static assets
        run: |
          curl -f http://localhost:5001/ || exit 1
          curl -f http://localhost:5001/app.css || exit 1
          curl -f http://localhost:5001/bootstrap/bootstrap.min.css || exit 1
          curl -f http://localhost:5001/_framework/blazor.web.js || exit 1

      - name: Smoke test API health
        run: |
          curl -f http://localhost:5000/health || exit 1

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "===== docker compose ps ====="
          docker compose -f docker-compose.prod.yml ps
          echo "===== web logs ====="
          docker compose -f docker-compose.prod.yml logs web
          echo "===== api logs ====="
          docker compose -f docker-compose.prod.yml logs api
          echo "===== db logs ====="
          docker compose -f docker-compose.prod.yml logs db

      - name: Shutdown stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v